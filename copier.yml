# Copier configuration for python-agent-template
# Scaffold a new project : uvx copier copy gh:giacolees/python-agent-template <new-project-dir>
# Pull in future updates : uvx copier update   (from inside the downstream repo)

project_name:
  type: str
  help: "Human-readable project name (e.g. My Cool Project)"

project_slug:
  type: str
  help: "Python package / directory name — no spaces, use underscores (e.g. my_cool_project)"
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

description:
  type: str
  help: "One-line project description"
  default: "A Python project based on python-agent-template."

author:
  type: str
  help: "Author name or GitHub username"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

_subdirectory: template
_templates_suffix: ""
_exclude:
  - copier.yml
  - .git
  - .copier-answers.yml

include_release_workflow:
  type: bool
  help: "Include GitHub Actions workflow for automatic PyPI releases?"
  default: true

include_agent_memory:
  type: bool
  help: "Include the mem0-backed shared agent-memory system (memory/ package, .agent-memory/, MCP server, extractor hook)?"
  default: true

include_compaction_memory:
  type: bool
  help: "Include PreCompact session-memory extraction hooks? (requires agent memory)"
  default: true
  when: "{{ include_agent_memory }}"

include_commit_advisor:
  type: bool
  help: "Include the AI commit-advisor pre-commit hook (suggests commit messages via the Claude CLI)?"
  default: true

include_agent_rules:
  type: bool
  help: "Include the .agentrules/ binding coding standards?"
  default: true
