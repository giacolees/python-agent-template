name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read latest released version
        id: latest
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check whether the version changed
        id: check
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          LATEST_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Validation is intentionally omitted here: the template files contain
      # unresolved Jinja2 and cannot be linted/type-checked directly. CI
      # already renders the template and runs the full suite on every push to
      # main (see ci.yml), so by the time this job runs the commit is green.

      - name: Tag and create release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          TAG="v$CURRENT_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists; skipping release creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" --generate-notes
          fi
