repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: uv.lock

{% if include_commit_advisor or include_agent_memory %}  - repo: local
    hooks:
{% if include_commit_advisor %}      - id: commit-advisor
        name: AI commit advisor (worth-it check + message suggestion)
        entry: scripts/commit_advisor.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
{% endif %}{% if include_agent_memory %}      - id: agent-memory
        name: Shared agent memory extractor (advisory)
        entry: scripts/memory_extractor.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
{% endif %}{% endif %}
